site_name: DeepGBoost — Distributed Gradient Boosting Forest
site_description: Distributed Gradient Boosting Forest — deep graph tree ensemble combining RandomForest and GradientBoosting into a layered neural-network-style architecture.
site_url: https://delgadopanadero.com/DeepGBoost/
repo_name: DelgadoPanadero/DeepGBoost
repo_url: https://github.com/DelgadoPanadero/DeepGBoost

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - tags
  - social
  - mkdocs-jupyter:
      execute: false
      include_source: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            heading_level: 2

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/delgado-panadero
    - icon: fontawesome/brands/x-twitter
      link: https://twitter.com/panaderodelgado

nav:
  - Home: index.md
  - Examples:
    - Quick Start: examples/quickstart.ipynb
    - Regressor: examples/regressor.ipynb
    - Classifier: examples/classifier.ipynb
    - Serialization: examples/serialization.ipynb
  - API Reference:
    - Estimators:
      - DeepGBoostRegressor: api/regressor.md
      - DeepGBoostClassifier: api/classifier.md
      - DeepGBoostMultiClassifier: api/multiclassifier.md
    - Core:
      - DGBFModel: api/dgbf.md
      - DGBFMultiOutputModel: api/dgbf_multioutput.md
    - Callbacks: api/callbacks.md
    - Objectives: api/objectives.md
    - Metrics: api/metrics.md
    - Utilities: api/utils.md
